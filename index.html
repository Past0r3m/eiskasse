<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eiskasse">
<meta name="theme-color" content="#0f0f14">
<meta name="mobile-web-app-capable" content="yes">
<title>Eiskasse</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --mint: #7ee8c8;
    --pink: #f08fad;
    --cream: #f5e6c8;
    --violet: #9d8fff;
    --text: #e8e8f0;
    --text-dim: #7878a0;
    --danger: #ff6b6b;
    --success: #6be8a0;
    --radius: 14px;
    --radius-sm: 8px;
    --transition-theme: background 0.25s, color 0.25s, border-color 0.25s;
  }

  /* ── Light mode ── */
  [data-theme="light"] {
    --bg: #f0f0ec;
    --surface: #ffffff;
    --surface2: #e8e8e4;
    --border: #d0d0cc;
    --mint: #0d9e74;
    --pink: #c44d72;
    --cream: #7a5200;
    --violet: #5b46d4;
    --text: #16162a;
    --text-dim: #80809a;
    --danger: #cc2a1f;
    --success: #0f7a3e;
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f0f0ec;
      --surface: #ffffff;
      --surface2: #e8e8e4;
      --border: #d0d0cc;
      --mint: #0d9e74;
      --pink: #c44d72;
      --cream: #7a5200;
      --violet: #5b46d4;
      --text: #16162a;
      --text-dim: #80809a;
      --danger: #cc2a1f;
      --success: #0f7a3e;
    }
  }

  /* Theme toggle */
  .theme-toggle {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .theme-toggle:active { transform: scale(0.93); }
  .theme-toggle .ico { font-size: 1rem; line-height: 1; }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    transition: var(--transition-theme);
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--mint), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: 10px;
  }
  .tab-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
  }
  .clock {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* VIEWS */
  .view { display: none; flex: 1; overflow: hidden; }
  .view.active { display: flex; }

  /* ─────── POS VIEW ─────── */
  #pos-view { flex-direction: row; gap: 0; }

  /* LEFT: scroll area */
  .pos-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .pos-items::-webkit-scrollbar { width: 4px; }
  .pos-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }

  .item-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    gap: 6px;
    min-height: 90px;
    -webkit-active-highlight-color: transparent;
  }
  .item-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .item-btn.scoop-small::before { background: radial-gradient(circle at center, rgba(126,232,200,0.12), transparent 70%); }
  .item-btn.scoop-large::before { background: radial-gradient(circle at center, rgba(240,143,173,0.12), transparent 70%); }
  .item-btn.becher-btn::before  { background: radial-gradient(circle at center, rgba(157,143,255,0.12), transparent 70%); }
  .item-btn:active::before { opacity: 1; }
  .item-btn:active { transform: scale(0.96); border-color: var(--mint); }

  .item-btn .ico { font-size: 1.8rem; line-height: 1; }
  .item-btn .lbl {
    font-size: 0.8rem;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
  }
  .item-btn .price-tag {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-dim);
  }
  .item-btn.scoop-small .price-tag { color: var(--mint); }
  .item-btn.scoop-large .price-tag { color: var(--pink); }
  .item-btn.becher-btn .price-tag { color: var(--violet); }

  /* RIGHT: cart / total */
  .pos-sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cart-list::-webkit-scrollbar { width: 3px; }
  .cart-list::-webkit-scrollbar-thumb { background: var(--border); }

  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    font-size: 0.78rem;
    gap: 6px;
  }
  .cart-item-name { flex: 1; color: var(--text); line-height: 1.2; }
  .cart-item-price { color: var(--cream); font-weight: 500; white-space: nowrap; }
  .cart-item-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .cart-item-del:hover { color: var(--danger); }

  .cart-empty {
    color: var(--text-dim);
    font-size: 0.8rem;
    text-align: center;
    padding: 30px 10px;
    line-height: 1.6;
  }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .total-label { font-size: 0.75rem; color: var(--text-dim); }
  .total-amount {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--cream);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--mint), var(--violet));
    color: #0f0f14;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text-dim); }

  /* ─────── SUMMARY VIEW ─────── */
  #summary-view {
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    gap: 16px;
  }
  #summary-view::-webkit-scrollbar { width: 4px; }
  #summary-view::-webkit-scrollbar-thumb { background: var(--border); }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .summary-card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .summary-table th {
    padding: 10px 18px;
    text-align: left;
    font-weight: 500;
    color: var(--text-dim);
    background: var(--surface2);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .summary-table td {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    color: var(--text);
  }
  .summary-table tr:hover td { background: var(--surface2); }
  .td-right { text-align: right; }
  .td-bold { font-weight: 600; color: var(--cream); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--cream);
  }

  .export-row { display: flex; gap: 10px; }
  .export-row .btn-primary { background: linear-gradient(135deg, var(--mint), #4ecdc4); }
  .export-row .btn-pdf { background: linear-gradient(135deg, var(--pink), #ff8c69); }

  .btn-pdf {
    background: linear-gradient(135deg, var(--pink), #ff8c69);
    color: #0f0f14;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s;
    flex: 1;
  }

  .no-data {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.8;
  }

  /* ─────── SETTINGS VIEW ─────── */
  #settings-view {
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    gap: 16px;
  }
  #settings-view::-webkit-scrollbar { width: 4px; }

  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .settings-card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .settings-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .field-label { font-size: 0.82rem; color: var(--text); flex: 1; }
  .field-sublabel { font-size: 0.72rem; color: var(--text-dim); }

  .input-field {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    width: 100px;
    text-align: right;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-field:focus { border-color: var(--mint); }
  .input-wide { width: 100%; text-align: left; }

  .becher-list { display: flex; flex-direction: column; gap: 8px; }
  .becher-entry {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .becher-entry .input-field { flex: 1; width: auto; text-align: left; }
  .becher-entry .input-price { width: 80px; text-align: right; flex-shrink: 0; }

  .btn-del-becher {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--danger);
    border-radius: var(--radius-sm);
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-del-becher:hover { background: rgba(255,107,107,0.1); }

  .btn-add {
    background: none;
    border: 1.5px dashed var(--border);
    color: var(--text-dim);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 0.8rem;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-add:hover { border-color: var(--mint); color: var(--mint); }

  .btn-save-settings {
    background: linear-gradient(135deg, var(--mint), var(--violet));
    color: #0f0f14;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
  }

  .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    display: inline-block;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 0.82rem;
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Print styles */
  @media print {
    body { background: white; color: black; }
    header, .header-tabs, #pos-view, #settings-view, .export-row, .tab-btn { display: none !important; }
    #summary-view { display: flex !important; overflow: visible; padding: 0; }
    .stat-card, .summary-card { border: 1px solid #ccc; }
    .summary-table td, .summary-table th { color: black; background: white; }
  }
</style>
</head>
<body>

<header>
  <h1>🍦 Eiskasse</h1>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="switchTab('pos')">Kasse</button>
    <button class="tab-btn" onclick="switchTab('summary')">Übersicht</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">
      <span class="ico" id="theme-icon">🌙</span>
      <span id="theme-label">Hell</span>
    </button>
    <span class="clock" id="clock">--:--</span>
  </div>
</header>

<!-- ══════════ POS VIEW ══════════ -->
<div id="pos-view" class="view active">
  <div class="pos-items" id="pos-items-area">
    <!-- rendered by JS -->
  </div>

  <div class="pos-sidebar">
    <div class="sidebar-header">
      Bon
      <button class="btn-secondary" style="width:auto;padding:4px 10px;font-size:0.72rem" onclick="clearCart()">Leeren</button>
    </div>
    <div class="cart-list" id="cart-list">
      <p class="cart-empty">Noch nichts gewählt.<br>Tippe auf einen Artikel.</p>
    </div>
    <div class="sidebar-footer">
      <div class="total-row">
        <span class="total-label">Gesamt</span>
        <span class="total-amount" id="cart-total">0,00 €</span>
      </div>
      <button class="btn-primary" id="btn-checkout" onclick="checkout()" disabled>Abschließen ✓</button>
      <button class="btn-secondary" onclick="clearCart()">Alles löschen</button>
    </div>
  </div>
</div>

<!-- ══════════ SUMMARY VIEW ══════════ -->
<div id="summary-view" class="view">
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-label">Umsatz</span>
      <span class="stat-value" id="stat-revenue">0,00 €</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Transaktionen</span>
      <span class="stat-value" id="stat-tx">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Kugeln gesamt</span>
      <span class="stat-value" id="stat-scoops">0</span>
    </div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header">🍨 Kugeln</div>
    <table class="summary-table">
      <thead><tr>
        <th>Artikel</th>
        <th class="td-right">Menge</th>
        <th class="td-right">Umsatz</th>
      </tr></thead>
      <tbody id="summary-scoops"></tbody>
    </table>
  </div>

  <div class="summary-card">
    <div class="summary-card-header">🥤 Eisbecher</div>
    <table class="summary-table">
      <thead><tr>
        <th>Eisbecher</th>
        <th class="td-right">Menge</th>
        <th class="td-right">Umsatz</th>
      </tr></thead>
      <tbody id="summary-becher"></tbody>
    </table>
  </div>

  <div class="export-row">
    <button class="btn-primary" onclick="exportExcel()">📊 Excel Export</button>
    <button class="btn-pdf" onclick="exportPDF()">🖨️ PDF / Drucken</button>
  </div>

  <div style="text-align:center">
    <button class="btn-secondary" style="width:auto;padding:8px 24px;color:var(--danger);border-color:var(--danger)" onclick="resetDay()">Tag zurücksetzen</button>
  </div>
</div>

<!-- ══════════ SETTINGS VIEW ══════════ -->
<div id="settings-view" class="view">
  <div class="settings-card">
    <div class="settings-card-header">🍦 Kugelpreise</div>
    <div class="settings-body">
      <div class="field-row">
        <div>
          <div class="field-label">Kleine Kugel</div>
          <div class="field-sublabel">Standard Größe</div>
        </div>
        <input type="number" class="input-field" id="price-small" step="0.05" min="0" placeholder="1.00">
        <span style="font-size:0.8rem;color:var(--text-dim)">€</span>
      </div>
      <div class="field-row">
        <div>
          <div class="field-label">Große Kugel</div>
          <div class="field-sublabel">Jumbo Größe</div>
        </div>
        <input type="number" class="input-field" id="price-large" step="0.05" min="0" placeholder="1.50">
        <span style="font-size:0.8rem;color:var(--text-dim)">€</span>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="settings-card-header">🥤 Eisbecher verwalten</div>
    <div class="settings-body">
      <div class="becher-list" id="becher-list">
        <!-- rendered by JS -->
      </div>
      <button class="btn-add" onclick="addBecherField()">+ Eisbecher hinzufügen</button>
    </div>
  </div>

  <button class="btn-save-settings" onclick="saveSettings()">Einstellungen speichern</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───
let config = {
  priceSmall: 1.20,
  priceLarge: 1.80,
  becher: [
    { name: 'Spaghetti-Eis', price: 5.50 },
    { name: 'Eisbecher Hawaii', price: 6.00 },
    { name: 'Schokotraum', price: 5.00 },
  ]
};
let cart = [];
let sales = { scoopSmall: 0, scoopLarge: 0, becher: {} }; // daily totals

// ─── Persist ───
function save() {
  localStorage.setItem('eiskasse_config', JSON.stringify(config));
  localStorage.setItem('eiskasse_sales', JSON.stringify(sales));
}
function load() {
  const c = localStorage.getItem('eiskasse_config');
  const s = localStorage.getItem('eiskasse_sales');
  if (c) config = JSON.parse(c);
  if (s) sales = JSON.parse(s);
}

// ─── Tab switching ───
function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-view').classList.add('active');
  event.target.classList.add('active');
  if (name === 'summary') renderSummary();
  if (name === 'settings') renderSettings();
}

// ─── POS rendering ───
function renderPOS() {
  const area = document.getElementById('pos-items-area');
  area.innerHTML = `
    <div>
      <div class="section-label">Kugeln</div>
      <div class="grid2">
        <button class="item-btn scoop-small" onclick="addToCart('scoop-small')">
          <span class="ico">🍦</span>
          <span class="lbl">Kugel Klein</span>
          <span class="price-tag">${fmt(config.priceSmall)}</span>
        </button>
        <button class="item-btn scoop-large" onclick="addToCart('scoop-large')">
          <span class="ico">🍨</span>
          <span class="lbl">Kugel Groß</span>
          <span class="price-tag">${fmt(config.priceLarge)}</span>
        </button>
      </div>
    </div>
    <div>
      <div class="section-label">Eisbecher</div>
      <div class="grid3">
        ${config.becher.map((b, i) => `
          <button class="item-btn becher-btn" onclick="addToCart('becher-${i}')">
            <span class="ico">🥤</span>
            <span class="lbl">${escHtml(b.name)}</span>
            <span class="price-tag">${fmt(b.price)}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

// ─── Cart ───
function addToCart(type) {
  let item;
  if (type === 'scoop-small') item = { type, name: 'Kugel Klein', price: config.priceSmall };
  else if (type === 'scoop-large') item = { type, name: 'Kugel Groß', price: config.priceLarge };
  else {
    const idx = parseInt(type.split('-')[1]);
    const b = config.becher[idx];
    item = { type, name: b.name, price: b.price };
  }
  cart.push({ ...item, id: Date.now() + Math.random() });
  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const btn = document.getElementById('btn-checkout');
  const total = cart.reduce((s, c) => s + c.price, 0);
  document.getElementById('cart-total').textContent = fmt(total);
  btn.disabled = cart.length === 0;

  if (cart.length === 0) {
    list.innerHTML = '<p class="cart-empty">Noch nichts gewählt.<br>Tippe auf einen Artikel.</p>';
    return;
  }
  list.innerHTML = cart.map(c => `
    <div class="cart-item">
      <span class="cart-item-name">${escHtml(c.name)}</span>
      <span class="cart-item-price">${fmt(c.price)}</span>
      <button class="cart-item-del" onclick="removeFromCart(${c.id})">✕</button>
    </div>
  `).join('');
}

function checkout() {
  if (cart.length === 0) return;
  cart.forEach(c => {
    if (c.type === 'scoop-small') sales.scoopSmall++;
    else if (c.type === 'scoop-large') sales.scoopLarge++;
    else {
      const name = c.name;
      if (!sales.becher[name]) sales.becher[name] = { qty: 0, price: c.price };
      sales.becher[name].qty++;
    }
  });
  save();
  clearCart();
  showToast('✓ Transaktion gespeichert');
}

// ─── Summary ───
function renderSummary() {
  // Stats
  const totalScoops = sales.scoopSmall + sales.scoopLarge;
  const scoopRev = sales.scoopSmall * config.priceSmall + sales.scoopLarge * config.priceLarge;
  const becherRev = Object.values(sales.becher).reduce((s, b) => s + b.qty * b.price, 0);
  const totalRev = scoopRev + becherRev;
  const totalTx = Math.ceil(totalScoops / 1) + Object.values(sales.becher).reduce((s,b)=>s+b.qty,0);

  document.getElementById('stat-revenue').textContent = fmt(totalRev);
  document.getElementById('stat-scoops').textContent = totalScoops;
  document.getElementById('stat-tx').textContent = Object.values(sales.becher).reduce((s,b)=>s+b.qty,0) + (sales.scoopSmall + sales.scoopLarge > 0 ? 1 : 0);

  // Scoops table
  const scoopsTbody = document.getElementById('summary-scoops');
  if (totalScoops === 0) {
    scoopsTbody.innerHTML = '<tr><td colspan="3" class="no-data">Noch keine Kugeln verkauft</td></tr>';
  } else {
    scoopsTbody.innerHTML = `
      ${sales.scoopSmall > 0 ? `<tr><td>Kugel Klein</td><td class="td-right">${sales.scoopSmall}×</td><td class="td-right td-bold">${fmt(sales.scoopSmall * config.priceSmall)}</td></tr>` : ''}
      ${sales.scoopLarge > 0 ? `<tr><td>Kugel Groß</td><td class="td-right">${sales.scoopLarge}×</td><td class="td-right td-bold">${fmt(sales.scoopLarge * config.priceLarge)}</td></tr>` : ''}
      <tr style="background:var(--surface2)">
        <td><strong>Gesamt Kugeln</strong></td>
        <td class="td-right"><strong>${totalScoops}×</strong></td>
        <td class="td-right td-bold"><strong>${fmt(scoopRev)}</strong></td>
      </tr>
    `;
  }

  // Becher table
  const becherTbody = document.getElementById('summary-becher');
  const becherEntries = Object.entries(sales.becher).filter(([,v]) => v.qty > 0);
  if (becherEntries.length === 0) {
    becherTbody.innerHTML = '<tr><td colspan="3" class="no-data">Noch keine Eisbecher verkauft</td></tr>';
  } else {
    const rows = becherEntries.map(([name, v]) =>
      `<tr><td>${escHtml(name)}</td><td class="td-right">${v.qty}×</td><td class="td-right td-bold">${fmt(v.qty * v.price)}</td></tr>`
    ).join('');
    const totQty = becherEntries.reduce((s,[,v])=>s+v.qty,0);
    becherTbody.innerHTML = rows + `
      <tr style="background:var(--surface2)">
        <td><strong>Gesamt Becher</strong></td>
        <td class="td-right"><strong>${totQty}×</strong></td>
        <td class="td-right td-bold"><strong>${fmt(becherRev)}</strong></td>
      </tr>
    `;
  }
}

// ─── Export ───
function exportExcel() {
  const today = new Date().toLocaleDateString('de-DE');
  const wb = XLSX.utils.book_new();
  const rows = [
    ['Eiskasse – Tagesabschluss', today],
    [],
    ['KUGELN'],
    ['Artikel', 'Menge', 'Einzelpreis', 'Umsatz'],
  ];
  if (sales.scoopSmall > 0) rows.push(['Kugel Klein', sales.scoopSmall, config.priceSmall, sales.scoopSmall * config.priceSmall]);
  if (sales.scoopLarge > 0) rows.push(['Kugel Groß', sales.scoopLarge, config.priceLarge, sales.scoopLarge * config.priceLarge]);
  const scoopTotal = sales.scoopSmall * config.priceSmall + sales.scoopLarge * config.priceLarge;
  rows.push(['Gesamt Kugeln', sales.scoopSmall + sales.scoopLarge, '', scoopTotal]);
  rows.push([]);
  rows.push(['EISBECHER']);
  rows.push(['Name', 'Menge', 'Einzelpreis', 'Umsatz']);
  let becherTotal = 0;
  let becherQtyTotal = 0;
  Object.entries(sales.becher).forEach(([name, v]) => {
    rows.push([name, v.qty, v.price, v.qty * v.price]);
    becherTotal += v.qty * v.price;
    becherQtyTotal += v.qty;
  });
  rows.push(['Gesamt Eisbecher', becherQtyTotal, '', becherTotal]);
  rows.push([]);
  rows.push(['GESAMTUMSATZ', '', '', scoopTotal + becherTotal]);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:22},{wch:8},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws, 'Tagesabschluss');
  XLSX.writeFile(wb, `Eiskasse_${today.replace(/\./g,'-')}.xlsx`);
  showToast('📊 Excel wird heruntergeladen...');
}

function exportPDF() {
  renderSummary();
  window.print();
}

function resetDay() {
  if (!confirm('Tagesumsatz wirklich zurücksetzen? Das kann nicht rückgängig gemacht werden.')) return;
  sales = { scoopSmall: 0, scoopLarge: 0, becher: {} };
  save();
  renderSummary();
  showToast('🔄 Tag zurückgesetzt');
}

// ─── Settings ───
function renderSettings() {
  document.getElementById('price-small').value = config.priceSmall;
  document.getElementById('price-large').value = config.priceLarge;
  renderBecherFields();
}

function renderBecherFields() {
  const list = document.getElementById('becher-list');
  list.innerHTML = config.becher.map((b, i) => `
    <div class="becher-entry">
      <input type="text" class="input-field" id="becher-name-${i}" value="${escAttr(b.name)}" placeholder="Name">
      <input type="number" class="input-field input-price" id="becher-price-${i}" value="${b.price}" step="0.05" min="0">
      <span style="font-size:0.75rem;color:var(--text-dim)">€</span>
      <button class="btn-del-becher" onclick="deleteBecherField(${i})">✕</button>
    </div>
  `).join('');
}

function addBecherField() {
  config.becher.push({ name: '', price: 0.00 });
  renderBecherFields();
  // focus last name field
  setTimeout(() => {
    const last = document.getElementById(`becher-name-${config.becher.length - 1}`);
    if (last) last.focus();
  }, 50);
}

function deleteBecherField(i) {
  config.becher.splice(i, 1);
  renderBecherFields();
}

function saveSettings() {
  config.priceSmall = parseFloat(document.getElementById('price-small').value) || 0;
  config.priceLarge = parseFloat(document.getElementById('price-large').value) || 0;
  config.becher = [];
  let idx = 0;
  while (document.getElementById(`becher-name-${idx}`) !== null) {
    const name = document.getElementById(`becher-name-${idx}`).value.trim();
    const price = parseFloat(document.getElementById(`becher-price-${idx}`).value) || 0;
    if (name) config.becher.push({ name, price });
    idx++;
  }
  save();
  renderPOS();
  showToast('✓ Einstellungen gespeichert');
}

// ─── Helpers ───
function fmt(n) {
  return n.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Theme ───
function applyTheme(theme) {
  const root = document.documentElement;
  const btn = document.getElementById('theme-toggle-btn');
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  const meta = document.querySelector('meta[name="theme-color"]');

  if (theme === 'dark') {
    root.setAttribute('data-theme', 'dark');
    icon.textContent = '☀️';
    label.textContent = 'Hell';
    if (meta) meta.content = '#0f0f14';
  } else {
    root.setAttribute('data-theme', 'light');
    icon.textContent = '🌙';
    label.textContent = 'Dunkel';
    if (meta) meta.content = '#f0f0ec';
  }
  localStorage.setItem('eiskasse_theme', theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || getSystemTheme();
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function initTheme() {
  const saved = localStorage.getItem('eiskasse_theme');
  applyTheme(saved || getSystemTheme());
  // Listen for system changes (only if no manual override)
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
    if (!localStorage.getItem('eiskasse_theme')) {
      applyTheme(e.matches ? 'light' : 'dark');
    }
  });
}

// ─── Clock ───
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ─── Init ───
load();
renderPOS();
renderCart();
initTheme();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('[SW] Registered:', reg.scope))
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
}
